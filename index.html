<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>AI Thinking Orb</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-deep: #040712;
        --bg-mid: #09182d;
        --bg-glow: #113862;
        --line: rgba(149, 220, 255, 0.14);
        --text: rgba(214, 243, 255, 0.82);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding:
          max(16px, env(safe-area-inset-top))
          max(16px, env(safe-area-inset-right))
          max(16px, env(safe-area-inset-bottom))
          max(16px, env(safe-area-inset-left));
        background:
          radial-gradient(circle at 50% 12%, rgba(76, 172, 255, 0.16), transparent 26%),
          radial-gradient(circle at 18% 82%, rgba(0, 216, 255, 0.1), transparent 24%),
          linear-gradient(180deg, #03050b 0%, var(--bg-deep) 34%, #050d18 100%);
        color: white;
        font-family: "IBM Plex Mono", "SF Mono", "Space Mono", Menlo, Consolas, monospace;
        overflow: hidden;
      }

      .stage {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        width: min(100%, 820px);
      }

      .frame {
        position: relative;
        width: min(800px, calc(100vw - 32px), calc(100dvh - 164px));
        max-width: 100%;
      }

      .frame::before,
      .frame::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 28px;
        pointer-events: none;
      }

      .frame::before {
        border: 1px solid rgba(156, 220, 255, 0.12);
        box-shadow:
          0 24px 90px rgba(4, 8, 24, 0.56),
          inset 0 0 0 1px rgba(255, 255, 255, 0.02);
      }

      .frame::after {
        inset: 20px;
        border: 1px solid rgba(148, 218, 255, 0.08);
        filter: blur(0.4px);
      }

      canvas {
        display: block;
        width: 100%;
        height: auto;
        aspect-ratio: 1;
        border-radius: 28px;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
        cursor: grab;
        background:
          radial-gradient(circle at 50% 42%, rgba(22, 60, 103, 0.3), rgba(4, 7, 18, 0.94) 62%),
          linear-gradient(180deg, rgba(14, 28, 52, 0.96), rgba(5, 10, 20, 0.98));
      }

      .frame.is-grabbing canvas {
        cursor: grabbing;
      }

      .overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding: 22px;
      }

      .hint-pill {
        padding: 10px 14px;
        border: 1px solid rgba(138, 216, 255, 0.16);
        border-radius: 999px;
        background: rgba(7, 15, 28, 0.48);
        color: rgba(217, 245, 255, 0.88);
        font-size: 10px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        backdrop-filter: blur(10px);
      }

      .input-panel {
        width: 180px;
        padding: 10px;
        border: 1px solid rgba(140, 218, 255, 0.12);
        border-radius: 18px;
        background: rgba(4, 10, 22, 0.5);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.025);
        backdrop-filter: blur(12px);
      }

      .input-header {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 8px;
        color: rgba(214, 241, 255, 0.84);
        font-size: 9px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .input-state {
        color: rgba(140, 222, 255, 0.9);
      }

      .input-visual {
        position: relative;
        width: 100%;
        aspect-ratio: 4 / 3;
        border-radius: 12px;
        background:
          radial-gradient(circle at 50% 35%, rgba(47, 123, 198, 0.58), rgba(5, 12, 24, 0.96));
        overflow: hidden;
      }

      .input-visual video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scaleX(-1);
        opacity: 0;
        transition: opacity 180ms ease;
      }

      .input-visual.has-camera video {
        opacity: 0.88;
      }

      .input-visual::before,
      .input-visual::after {
        content: "";
        position: absolute;
        inset: 16%;
        border-radius: 999px;
        pointer-events: none;
        z-index: 1;
      }

      .input-visual::before {
        border: 1px solid rgba(161, 228, 255, 0.26);
      }

      .input-visual::after {
        inset: 28%;
        background: radial-gradient(circle, rgba(174, 240, 255, 0.95), rgba(95, 209, 255, 0.14) 55%, rgba(0, 0, 0, 0) 72%);
        animation: pulse-dot 2.6s ease-in-out infinite;
      }

      .input-caption {
        margin-top: 8px;
        color: rgba(196, 232, 255, 0.64);
        font-size: 8px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      @keyframes pulse-dot {
        0%,
        100% {
          transform: scale(0.84);
          opacity: 0.66;
        }

        50% {
          transform: scale(1.05);
          opacity: 1;
        }
      }

      .status {
        min-height: 1.2em;
        font-size: 12px;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: var(--text);
        will-change: opacity, transform;
        text-align: center;
      }

      @media (max-width: 820px) {
        body {
          padding:
            max(12px, env(safe-area-inset-top))
            max(12px, env(safe-area-inset-right))
            max(12px, env(safe-area-inset-bottom))
            max(12px, env(safe-area-inset-left));
        }

        .status {
          font-size: 11px;
          letter-spacing: 0.2em;
        }

        .overlay {
          padding: 14px;
          flex-direction: column;
          gap: 12px;
          align-items: flex-start;
        }

        .input-panel {
          width: 150px;
        }

        .frame::before,
        .frame::after,
        canvas {
          border-radius: 22px;
        }
      }

      @media (max-width: 540px), (max-height: 740px) {
        .stage {
          gap: 12px;
        }

        .frame {
          width: min(calc(100vw - 24px), calc(100dvh - 148px));
        }

        .overlay {
          padding: 10px;
          gap: 10px;
        }

        .input-panel {
          width: min(156px, 44vw);
          padding: 8px;
          border-radius: 14px;
        }

        .hint-pill {
          padding: 8px 10px;
          font-size: 8px;
          letter-spacing: 0.14em;
        }

        .input-caption {
          font-size: 7px;
          letter-spacing: 0.08em;
        }

        .status {
          font-size: 10px;
          letter-spacing: 0.12em;
          max-width: min(100%, 92vw);
        }
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <div class="frame">
        <canvas id="orb" width="800" height="800" aria-label="Animated AI thinking orb"></canvas>
        <div class="overlay" aria-hidden="true">
          <div class="input-panel">
            <div class="input-header">
              <span>Direct Input</span>
              <span id="input-state" class="input-state">Ready</span>
            </div>
            <div id="input-visual" class="input-visual">
              <video id="camera-feed" autoplay muted playsinline></video>
            </div>
            <div id="input-caption" class="input-caption">Drag works immediately. Mobile haptics trigger on release when supported.</div>
          </div>
          <div class="hint-pill">Drag orb with mouse or touch</div>
        </div>
      </div>
      <div id="status" class="status" aria-live="polite"></div>
    </main>
    <script>
      (() => {
        const canvas = document.getElementById("orb");
        const ctx = canvas && canvas.getContext("2d");
        const frameEl = document.querySelector(".frame");
        const statusEl = document.getElementById("status");
        const inputStateEl = document.getElementById("input-state");
        const inputVisualEl = document.getElementById("input-visual");
        const inputCaptionEl = document.getElementById("input-caption");
        const cameraFeedEl = document.getElementById("camera-feed");

        if (!canvas || !ctx || !frameEl || !statusEl || !inputStateEl || !inputVisualEl || !inputCaptionEl || !cameraFeedEl) {
          return;
        }

        const width = canvas.width;
        const height = canvas.height;
        const centerX = width * 0.5;
        const centerY = height * 0.485;
        const sphereRadius = 220;
        const loopMs = 18000;
        const segmentMs = 3000;
        const twoPi = Math.PI * 2;
        const raf = window.requestAnimationFrame
          ? window.requestAnimationFrame.bind(window)
          : (callback) => window.setTimeout(() => callback(performance.now()), 16);

        const tasks = [
          "Analyzing context..",
          "Searching vector space...",
          "Optimizing response.....",
          "Synthesizing signal...",
          "Aligning latent intent..",
          "Refining final output..."
        ];

        const stars = Array.from({ length: 42 }, () => ({
          x: Math.random() * width,
          y: Math.random() * height,
          radius: 0.6 + Math.random() * 1.6,
          alpha: 0.16 + Math.random() * 0.26,
          phase: Math.random() * twoPi
        }));

        const dots = createSphereDots(760);
        let cameraStream = null;
        let lastHapticAt = 0;
        const interaction = {
          tracked: false,
          grabbed: false,
          targetX: 0,
          targetY: 0,
          offsetX: 0,
          offsetY: 0,
          velocityX: 0,
          velocityY: 0,
          dirX: 1,
          dirY: 0,
          stretch: 1,
          squash: 1,
          pointerX: centerX,
          pointerY: centerY,
          pointerType: "mouse",
          force: 0,
          pull: 0
        };
        const shockwaves = [];

        setInputState("Ready");

        function createSphereDots(count) {
          const goldenAngle = Math.PI * (3 - Math.sqrt(5));
          const items = [];

          for (let i = 0; i < count; i += 1) {
            const y = 1 - (i / (count - 1)) * 2;
            const radial = Math.sqrt(1 - y * y);
            const theta = goldenAngle * i;

            items.push({
              base: [Math.cos(theta) * radial, y, Math.sin(theta) * radial],
              size: 0.9 + Math.random() * 1.5,
              accent: Math.random()
            });
          }

          return items;
        }

        function clamp(value, min, max) {
          return Math.min(max, Math.max(min, value));
        }

        function dot(a, b) {
          return a[0] * b[0] + a[1] * b[1] + a[2] * b[2];
        }

        function normalize(vector) {
          const length = Math.hypot(vector[0], vector[1], vector[2]) || 1;
          return [vector[0] / length, vector[1] / length, vector[2] / length];
        }

        function rotatePoint(vector, pitch, yaw) {
          const cosPitch = Math.cos(pitch);
          const sinPitch = Math.sin(pitch);
          const y1 = vector[1] * cosPitch - vector[2] * sinPitch;
          const z1 = vector[1] * sinPitch + vector[2] * cosPitch;

          const cosYaw = Math.cos(yaw);
          const sinYaw = Math.sin(yaw);
          const x2 = vector[0] * cosYaw + z1 * sinYaw;
          const z2 = -vector[0] * sinYaw + z1 * cosYaw;

          return [x2, y1, z2];
        }

        function pulseAt(base, timeSeconds) {
          const lat = Math.asin(base[1]);
          const lon = Math.atan2(base[2], base[0]);
          const bandA = Math.pow(Math.max(0, Math.cos(lat * 10 - timeSeconds * 2.25)), 16);
          const bandB = Math.pow(Math.max(0, Math.cos(lon * 4 + lat * 5 - timeSeconds * 1.8 + 1.2)), 18);
          return Math.min(1, bandA * 0.78 + bandB * 0.62);
        }

        function setInputState(label) {
          inputStateEl.textContent = label;
        }

        function setInputCaption(label) {
          inputCaptionEl.textContent = label;
        }

        function triggerReleaseHaptic(pullMagnitude) {
          if (typeof navigator.vibrate !== "function") {
            return;
          }

          const now = performance.now();
          if (now - lastHapticAt < 120) {
            return;
          }

          const duration = pullMagnitude > 110 ? 18 : pullMagnitude > 65 ? 12 : 8;

          try {
            navigator.vibrate(duration);
            lastHapticAt = now;
          } catch (error) {
            void error;
          }
        }

        async function setupCameraPreview() {
          const hasMedia = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
          if (!hasMedia) {
            setInputState("No camera");
            setInputCaption("This browser does not expose getUserMedia.");
            return;
          }

          if (!window.isSecureContext && location.hostname !== "localhost" && location.protocol !== "file:") {
            setInputState("Blocked");
            setInputCaption("Open via https or localhost to use the camera.");
            return;
          }

          try {
            setInputState("Starting");
            setInputCaption("Allow camera access if the browser asks.");

            cameraStream = await navigator.mediaDevices.getUserMedia({
              audio: false,
              video: {
                facingMode: "user",
                width: { ideal: 320 },
                height: { ideal: 240 }
              }
            });

            cameraFeedEl.srcObject = cameraStream;
            await cameraFeedEl.play().catch(() => {});
            inputVisualEl.classList.add("has-camera");
            setInputState("Camera");
            setInputCaption("Live preview active. Drag still controls the orb.");
          } catch (error) {
            const name = error && error.name ? error.name : "Error";
            inputVisualEl.classList.remove("has-camera");

            if (name === "NotAllowedError") {
              setInputState("Denied");
              setInputCaption("Camera permission was denied by the browser.");
              return;
            }

            if (name === "NotFoundError" || name === "DevicesNotFoundError") {
              setInputState("Missing");
              setInputCaption("No camera device was found.");
              return;
            }

            setInputState("Failed");
            setInputCaption("Camera could not start here. Drag input still works.");
          }
        }

        function updateInteraction(dt) {
          const spring = interaction.grabbed ? 0.16 : 0.09;
          const damping = interaction.grabbed ? 0.78 : 0.86;

          interaction.velocityX += (interaction.targetX - interaction.offsetX) * spring * dt;
          interaction.velocityY += (interaction.targetY - interaction.offsetY) * spring * dt;
          interaction.velocityX *= damping;
          interaction.velocityY *= damping;
          interaction.offsetX += interaction.velocityX * dt;
          interaction.offsetY += interaction.velocityY * dt;

          const pullMagnitude = Math.hypot(interaction.offsetX, interaction.offsetY);
          if (pullMagnitude > 0.001) {
            interaction.dirX = interaction.offsetX / pullMagnitude;
            interaction.dirY = interaction.offsetY / pullMagnitude;
          }

          const targetStretch = 1 + Math.min(0.34, pullMagnitude / 260);
          const targetSquash = 1 - Math.min(0.2, (targetStretch - 1) * 0.7);

          interaction.stretch += (targetStretch - interaction.stretch) * 0.14 * dt;
          interaction.squash += (targetSquash - interaction.squash) * 0.14 * dt;
          interaction.pull = pullMagnitude;

          for (let index = shockwaves.length - 1; index >= 0; index -= 1) {
            const wave = shockwaves[index];
            wave.radius += (7 + wave.strength * 3) * dt;
            wave.alpha *= Math.pow(0.92, dt);
            if (wave.alpha < 0.02) {
              shockwaves.splice(index, 1);
            }
          }
        }

        function spawnShockwave() {
          shockwaves.push({
            x: centerX + interaction.offsetX * 0.32,
            y: centerY + interaction.offsetY * 0.32,
            radius: sphereRadius * 0.48,
            alpha: 0.34,
            strength: Math.min(1, interaction.pull / 120)
          });
        }

        function orbAnchor() {
          return {
            x: centerX + interaction.offsetX * 0.32,
            y: centerY + interaction.offsetY * 0.32
          };
        }

        function canvasPointFromEvent(event) {
          const rect = canvas.getBoundingClientRect();
          const scaleX = width / rect.width;
          const scaleY = height / rect.height;

          return {
            x: (event.clientX - rect.left) * scaleX,
            y: (event.clientY - rect.top) * scaleY
          };
        }

        function beginPull(event) {
          if (event.cancelable) {
            event.preventDefault();
          }

          const point = canvasPointFromEvent(event);
          const anchor = orbAnchor();
          const distance = Math.hypot(point.x - anchor.x, point.y - anchor.y);

          interaction.pointerX = point.x;
          interaction.pointerY = point.y;
          interaction.pointerType = event.pointerType || "mouse";
          interaction.tracked = distance < sphereRadius + 70;

          if (!interaction.tracked) {
            return;
          }

          interaction.grabbed = true;
          interaction.force = 1;
          interaction.targetX = clamp(point.x - centerX, -170, 170);
          interaction.targetY = clamp(point.y - centerY, -170, 170);
          frameEl.classList.add("is-grabbing");
          setInputState("Pulling");
          canvas.setPointerCapture(event.pointerId);
        }

        function movePull(event) {
          if (event.cancelable) {
            event.preventDefault();
          }

          const point = canvasPointFromEvent(event);
          interaction.pointerX = point.x;
          interaction.pointerY = point.y;

          if (interaction.grabbed) {
            interaction.targetX = clamp(point.x - centerX, -170, 170);
            interaction.targetY = clamp(point.y - centerY, -170, 170);
            interaction.force = 1;
            return;
          }

          const anchor = orbAnchor();
          const hoverDistance = Math.hypot(point.x - anchor.x, point.y - anchor.y);
          interaction.tracked = hoverDistance < sphereRadius + 50;
          setInputState(interaction.tracked ? "Hover" : "Ready");
        }

        function endPull(event) {
          if (event && event.cancelable) {
            event.preventDefault();
          }

          const releasedFromTouch = interaction.pointerType === "touch" || interaction.pointerType === "pen";
          const releasePull = interaction.pull;

          if (interaction.grabbed) {
            spawnShockwave();
            if (releasedFromTouch && releasePull > 18) {
              triggerReleaseHaptic(releasePull);
            }
          }

          interaction.grabbed = false;
          interaction.targetX = 0;
          interaction.targetY = 0;
          interaction.pointerType = "mouse";
          interaction.force = 0;
          interaction.tracked = false;
          frameEl.classList.remove("is-grabbing");
          setInputState("Ready");

          if (event && typeof canvas.releasePointerCapture === "function") {
            try {
              canvas.releasePointerCapture(event.pointerId);
            } catch (error) {
              void error;
            }
          }
        }

        function updateStatus(loopTime) {
          const slotFloat = loopTime / segmentMs;
          const index = Math.floor(slotFloat) % tasks.length;
          const localT = slotFloat - Math.floor(slotFloat);
          const fade = 0.38 + 0.62 * Math.sin(localT * Math.PI);
          const shift = (1 - fade) * 6;

          statusEl.textContent = tasks[index];
          statusEl.style.opacity = String(fade);
          statusEl.style.transform = `translateY(${shift.toFixed(2)}px)`;
        }

        function drawBackdrop(timeSeconds) {
          ctx.clearRect(0, 0, width, height);

          const baseGlow = ctx.createRadialGradient(centerX, centerY - 12, 90, centerX, centerY, 390);
          baseGlow.addColorStop(0, "rgba(20, 58, 116, 0.32)");
          baseGlow.addColorStop(0.48, "rgba(8, 17, 34, 0.28)");
          baseGlow.addColorStop(1, "rgba(3, 7, 14, 0.96)");
          ctx.fillStyle = baseGlow;
          ctx.fillRect(0, 0, width, height);

          ctx.save();
          ctx.globalCompositeOperation = "screen";
          for (const star of stars) {
            const twinkle = 0.45 + 0.55 * (0.5 + 0.5 * Math.sin(timeSeconds * 1.4 + star.phase));
            ctx.globalAlpha = star.alpha * twinkle;
            ctx.fillStyle = "rgba(190, 232, 255, 0.95)";
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.radius, 0, twoPi);
            ctx.fill();
          }
          ctx.restore();

          const halo = ctx.createRadialGradient(centerX, centerY, 50, centerX, centerY, 290);
          halo.addColorStop(0, "rgba(108, 225, 255, 0.14)");
          halo.addColorStop(0.46, "rgba(34, 110, 194, 0.12)");
          halo.addColorStop(1, "rgba(0, 0, 0, 0)");
          ctx.fillStyle = halo;
          ctx.beginPath();
          ctx.arc(centerX, centerY, 310, 0, twoPi);
          ctx.fill();

          ctx.save();
          for (const wave of shockwaves) {
            ctx.strokeStyle = `rgba(132, 229, 255, ${wave.alpha})`;
            ctx.lineWidth = 1.4 + wave.strength;
            ctx.beginPath();
            ctx.arc(wave.x, wave.y, wave.radius, 0, twoPi);
            ctx.stroke();
          }
          ctx.restore();
        }

        function drawOrbitGuides(timeSeconds) {
          ctx.save();
          ctx.strokeStyle = "rgba(131, 219, 255, 0.12)";
          ctx.lineWidth = 1;

          const guideX = centerX + interaction.offsetX * 0.24;
          const guideY = centerY + interaction.offsetY * 0.24;

          for (let i = 0; i < 3; i += 1) {
            ctx.beginPath();
            ctx.ellipse(
              guideX,
              guideY,
              sphereRadius + 18 + i * 16,
              sphereRadius * (0.28 + i * 0.06),
              timeSeconds * (0.22 + i * 0.05) + i * 0.9 + interaction.pull * 0.002,
              0,
              twoPi
            );
            ctx.stroke();
          }

          const satelliteAngle = timeSeconds * 1.1;
          const satX = guideX + Math.cos(satelliteAngle) * (sphereRadius + 50);
          const satY = guideY + Math.sin(satelliteAngle) * 52;
          ctx.fillStyle = "rgba(120, 238, 255, 0.95)";
          ctx.beginPath();
          ctx.arc(satX, satY, 3.2, 0, twoPi);
          ctx.fill();
          ctx.restore();
        }

        function drawTether() {
          if (!interaction.tracked) {
            return;
          }

          const orbX = centerX + interaction.offsetX * 0.32;
          const orbY = centerY + interaction.offsetY * 0.32;
          const edgeX = orbX + interaction.dirX * sphereRadius * 0.92;
          const edgeY = orbY + interaction.dirY * sphereRadius * 0.92;

          ctx.save();
          ctx.strokeStyle = `rgba(129, 230, 255, ${0.18 + interaction.force * 0.3})`;
          ctx.lineWidth = 1.6 + interaction.force * 1.2;
          ctx.beginPath();
          ctx.moveTo(edgeX, edgeY);
          ctx.quadraticCurveTo(
            orbX + interaction.offsetX * 0.18,
            orbY + interaction.offsetY * 0.18,
            interaction.pointerX,
            interaction.pointerY
          );
          ctx.stroke();

          ctx.fillStyle = `rgba(170, 242, 255, ${0.34 + interaction.force * 0.56})`;
          ctx.beginPath();
          ctx.arc(interaction.pointerX, interaction.pointerY, 8 + interaction.force * 8, 0, twoPi);
          ctx.fill();
          ctx.restore();
        }

        function drawOrb(loopTime) {
          const timeSeconds = loopTime * 0.001;
          const yaw = timeSeconds * 0.92;
          const pitch = Math.sin(timeSeconds * 0.72) * 0.42;
          const renderedDots = [];
          const light = normalize([Math.cos(timeSeconds * 0.35), -0.25, 1]);
          const orbX = centerX + interaction.offsetX * 0.32;
          const orbY = centerY + interaction.offsetY * 0.32;

          drawBackdrop(timeSeconds);
          drawOrbitGuides(timeSeconds);

          for (const item of dots) {
            const rotated = rotatePoint(item.base, pitch, yaw);
            const depth = (rotated[2] + 1) * 0.5;
            const perspective = 0.72 + depth * 0.7;
            let x = orbX + rotated[0] * sphereRadius * perspective;
            let y = orbY + rotated[1] * sphereRadius * perspective;
            const lighting = clamp(dot(rotated, light) * 0.5 + 0.5, 0, 1);
            const pulse = pulseAt(item.base, timeSeconds);
            const relativeX = x - orbX;
            const relativeY = y - orbY;
            const parallel = relativeX * interaction.dirX + relativeY * interaction.dirY;
            const perpendicular = -relativeX * interaction.dirY + relativeY * interaction.dirX;
            const stretchedParallel = parallel * interaction.stretch;
            const stretchedPerpendicular = perpendicular * interaction.squash;

            x = orbX + interaction.dirX * stretchedParallel - interaction.dirY * stretchedPerpendicular;
            y = orbY + interaction.dirY * stretchedParallel + interaction.dirX * stretchedPerpendicular;

            renderedDots.push({
              x,
              y,
              z: rotated[2],
              pulse,
              lighting,
              accent: item.accent,
              alpha: clamp(0.18 + depth * 0.82 + pulse * 0.28, 0, 1),
              size: item.size * (0.76 + perspective * 1.12 + pulse * 1.45)
            });
          }

          renderedDots.sort((a, b) => a.z - b.z);

          for (const point of renderedDots) {
            const brightness = clamp(0.45 + point.lighting * 0.55 + point.pulse * 0.4 + point.accent * 0.08, 0, 1.2);
            const red = Math.round(90 + 70 * brightness + point.pulse * 40);
            const green = Math.round(170 + 55 * brightness + point.pulse * 24);
            const blue = Math.round(225 + 18 * brightness);

            if (point.pulse > 0.24) {
              ctx.beginPath();
              ctx.fillStyle = `rgba(${red}, ${green + 12}, 255, ${0.08 + point.pulse * 0.12})`;
              ctx.arc(point.x, point.y, point.size * (2 + point.pulse * 0.8), 0, twoPi);
              ctx.fill();
            }

            ctx.beginPath();
            ctx.fillStyle = `rgba(${red}, ${green}, ${blue}, ${point.alpha})`;
            ctx.arc(point.x, point.y, point.size, 0, twoPi);
            ctx.fill();
          }

          drawTether();

          ctx.save();
          ctx.strokeStyle = "rgba(146, 225, 255, 0.12)";
          ctx.lineWidth = 1.2;
          ctx.beginPath();
          ctx.ellipse(
            orbX,
            orbY,
            sphereRadius + 36 + interaction.pull * 0.02,
            sphereRadius * 0.44,
            timeSeconds * 0.28 + interaction.pull * 0.002,
            0,
            twoPi
          );
          ctx.stroke();
          ctx.restore();
        }

        let lastTime = 0;

        function animate(now) {
          const loopTime = now % loopMs;
          const dt = clamp((now - lastTime) / 16.6667 || 1, 0.75, 1.8);
          lastTime = now;
          updateInteraction(dt);
          updateStatus(loopTime);
          drawOrb(loopTime);
          raf(animate);
        }

        statusEl.textContent = tasks[0];
        setupCameraPreview();
        canvas.addEventListener("pointerdown", beginPull);
        canvas.addEventListener("pointermove", movePull);
        canvas.addEventListener("pointerup", endPull);
        canvas.addEventListener("pointercancel", endPull);
        canvas.addEventListener("pointerleave", (event) => {
          if (!interaction.grabbed) {
            endPull(event);
          }
        });
        window.addEventListener("resize", () => {
          endPull();
        });
        window.addEventListener("beforeunload", () => {
          if (!cameraStream) {
            return;
          }

          for (const track of cameraStream.getTracks()) {
            track.stop();
          }
        });
        raf(animate);
      })();
    </script>
  </body>
</html>
